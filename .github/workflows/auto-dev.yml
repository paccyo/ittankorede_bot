name: AI Agent

on:
  issues:
    types:
      - opened

jobs:
  issue:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Antigravity CLI
        run: |
          curl -fsSL https://antigravity.google/cli/install.sh | bash

      - name: Check agy
        run: |
          agy --version

      - name: Create Issue File
        run: |
          cat << EOF > ISSUE.md
          # Issue

          Title:
          ${{ github.event.issue.title }}

          Body:
          ${{ github.event.issue.body }}
          EOF


      - name: Run AGY
        env:
          ANTIGRAVITY_TOKEN: ${{ secrets.ANTIGRAVITY_TOKEN }}
        run: |
          agy \
            --headless \
            --approve all \
            -p "
            AGENTS.mdを読み、
            ISSUE.mdの内容を解析してください。

            実装方針だけを説明してください。
            "
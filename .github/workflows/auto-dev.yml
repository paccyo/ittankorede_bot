name: AI Agent

on:
  issues:
    types:
      - opened

jobs:
  issue:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Issue File
        run: |
          cat << 'EOF' > ISSUE.md
          # Issue

          Title:
          ${{ github.event.issue.title }}

          Body:
          ${{ github.event.issue.body }}
          EOF

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.ANTIGRAVITY_API_KEY }}
          prompt: "こんにちは。1+1を計算してください。"
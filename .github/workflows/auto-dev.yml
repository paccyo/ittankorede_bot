name: AI Agent

on:
  issues:
    types:
      - opened

jobs:
  issue:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Antigravity CLI
        run: |
          curl -fsSL https://antigravity.google/cli/install.sh | bash

      - name: Check agy
        run: |
          agy --version

      - name: Create Issue File
        run: |
          cat << EOF > ISSUE.md
          # Issue

          Title:
          ${{ github.event.issue.title }}

          Body:
          ${{ github.event.issue.body }}
          EOF


      - name: Test AGY
        run: |
          agy \
            --dangerously-skip-permissions \
            --print \
            "こんにちは。1+1を計算してください。"
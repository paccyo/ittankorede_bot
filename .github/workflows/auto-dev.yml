name: AI Agent

on:
  issues:
    types:
      - opened

jobs:
  issue:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      - name: Save Issue
        run: |
          cat << EOF > ISSUE.md
          # Issue #${{ github.event.issue.number }}

          ## Title
          ${{ github.event.issue.title }}

          ## Body
          ${{ github.event.issue.body }}
          EOF

      - name: Show Issue File
        run: cat ISSUE.md
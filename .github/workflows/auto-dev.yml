name: AI Agent

on:
  issues:
    types:
      - opened

jobs:
  issue:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # git の設定
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 作業ブランチを作成
      - name: Create branch
        id: branch
        run: |
          BRANCH="ai/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Issue File
        run: |
          cat << 'EOF' > ISSUE.md
          # Issue

          Title:
          ${{ github.event.issue.title }}

          Body:
          ${{ github.event.issue.body }}
          EOF

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.ANTIGRAVITY_API_KEY }}
          settings: |
            {
              "approvalMode": "yolo"
            }
          prompt: |
            ISSUE.mdを読んで、その内容を実装してください。

            実装が終わったら以下のgitコマンドを順番に実行してください：
            1. git add -A
            2. git commit -m "feat: implement issue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"

            git pushはしないでください。
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"

      # 変更（コミット）があるかチェック
      - name: Check for changes
        id: check
        run: |
          if git log origin/main..HEAD --oneline | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push branch
        if: steps.check.outputs.changed == 'true'
        run: git push origin ${{ steps.branch.outputs.name }}

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.name }}
          base: main
          title: "feat: [AI] ${{ github.event.issue.title }}"
          body: |
            ## 🤖 AI自動実装PR

            Closes #${{ github.event.issue.number }}

            > AIが生成したコードです。マージ前に必ずレビューしてください。
          labels: |
            ai-generated
            needs-review

      - name: Comment on Issue
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ github.event.issue.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 実装完了！PR #${{ steps.pr.outputs.pull-request-number }} を確認してください。'
            })

      - name: Comment if no changes
        if: steps.check.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ github.event.issue.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ AIが変更を生成しませんでした。Issueの内容をより具体的に書いてみてください。'
            })
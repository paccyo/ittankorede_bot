name: Codex Issue Auto-Implement

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  implement:
    if: github.event_name == 'issues' && github.event.label.name == 'codex'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Run Codex Implementation
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          output-file: implementation-output.md
          prompt: |
            次のIssueを実装してください。

            ## タイトル
            ${{ github.event.issue.title }}

            ## 本文
            ${{ github.event.issue.body }}

            要件:
            - Issueを満たす実装を行うこと
            - 必要に応じて既存コードを修正すること
            - テストを追加・更新すること
            - 既存のコードスタイル・命名規則に従うこと
            - 実行可能なテストがあれば実行すること

            作業完了後、implementation-output.md に以下をMarkdownで出力してください。

            # 実装概要
            # 主な変更点
            # 変更ファイル
            # テスト
            - 追加・変更したテスト
            - テスト実行方法
            - 実行結果
            # レビュー時に確認してほしい点

      - name: Read Codex Summary
        id: summary
        shell: bash
        run: |
          DELIMITER="CODEX_SUMMARY_$(date +%s)_$RANDOM"

          {
            echo "body<<$DELIMITER"

            if [ -f implementation-output.md ]; then
              cat implementation-output.md
            else
              echo "Codex did not generate implementation-output.md."
            fi

            printf '\n'
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/issue-${{ github.event.issue.number }}
          commit-message: "feat: ${{ github.event.issue.title }}"
          title: "[Auto] ${{ github.event.issue.title }}"
          labels: codex-generated
          body: |
            ## 🤖 Codexによる自動実装

            Issue #${{ github.event.issue.number }} を実装しました。

            ---

            ${{ steps.summary.outputs.body }}

            ---

            ## レビュー依頼

            以下を中心にレビューをお願いします。

            - Issueの要件を満たしているか
            - 実装方針に問題がないか
            - テスト内容は十分か
            - 命名・可読性
            - パフォーマンス
            - セキュリティ

            ---

            ## Codexへの追加指示

            修正したい場合:

            ```text
            @codex fix
            ○○を修正してください。
            ```

            変更内容を説明してほしい場合:

            ```text
            @codex explain
            このPRの変更内容と設計意図を説明してください。
            ```

            **必ず人間がレビューしてからマージしてください。**

  codex-command:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '@codex ') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Parse Codex Command
        id: command
        shell: bash
        run: |
          BODY=$(cat <<'COMMENT_BODY'
          ${{ github.event.comment.body }}
          COMMENT_BODY
          )

          COMMAND=$(printf '%s\n' "$BODY" | head -n 1 | sed -E 's/^@codex[[:space:]]+([a-zA-Z0-9_-]+).*/\1/')

          echo "command=$COMMAND" >> "$GITHUB_OUTPUT"

          if [ "$COMMAND" = "fix" ] || [ "$COMMAND" = "explain" ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment Unsupported Command
        if: steps.command.outputs.supported == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `対応していないCodexコマンドです。

            利用可能なコマンド:

            \`\`\`text
            @codex fix
            @codex explain
            \`\`\``
            })

      - name: Stop Unsupported Command
        if: steps.command.outputs.supported == 'false'
        shell: bash
        run: exit 0

      - name: Get PR Information
        if: steps.command.outputs.supported == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PR=$(gh pr view ${{ github.event.issue.number }} --json headRefName,baseRefName)
          echo "branch=$(echo "$PR" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
          echo "base=$(echo "$PR" | jq -r '.baseRefName')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: steps.command.outputs.supported == 'true'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare PR Diff
        if: steps.command.outputs.supported == 'true'
        shell: bash
        run: |
          git fetch origin ${{ steps.pr.outputs.base }}
          git diff origin/${{ steps.pr.outputs.base }}...HEAD > pr-diff.patch

      - name: Run Codex Fix
        if: steps.command.outputs.command == 'fix'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          output-file: codex-output.md
          prompt: |
            このPull Requestへのレビューコメントを反映してください。

            ## PR番号
            #${{ github.event.issue.number }}

            ## レビューコメント
            ${{ github.event.comment.body }}

            ## PR差分
            pr-diff.patch に現在のPR差分があります。

            要件:
            - レビューコメントの内容を反映すること
            - 不要な変更はしないこと
            - 既存のコードスタイル・命名規則に従うこと
            - 必要に応じてテストを追加・修正すること
            - 実行可能なテストがあれば実行すること

            作業後、codex-output.md に以下をMarkdownで出力してください。

            # 修正概要
            # 変更ファイル
            # テスト
            - 追加・変更したテスト
            - テスト実行方法
            - 実行結果
            # レビュー時に確認してほしい点

      - name: Run Codex Explain
        if: steps.command.outputs.command == 'explain'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          output-file: codex-output.md
          prompt: |
            このPull Requestの変更内容をレビュー者向けに説明してください。

            ## PR番号
            #${{ github.event.issue.number }}

            ## ユーザーコメント
            ${{ github.event.comment.body }}

            ## PR差分
            pr-diff.patch にPRの差分があります。

            以下をMarkdownで簡潔にまとめてください。

            # 変更概要
            # 設計意図
            # 主な変更ファイル
            # テスト観点
            # レビュー時に確認してほしい点

      - name: Commit Fix
        if: steps.command.outputs.command == 'fix'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ steps.pr.outputs.branch }}
          commit_message: "fix: address review comments"
          file_pattern: .

      - name: Read Codex Output
        if: steps.command.outputs.supported == 'true'
        id: output
        shell: bash
        run: |
          DELIMITER="CODEX_OUTPUT_$(date +%s)_$RANDOM"

          {
            echo "body<<$DELIMITER"

            if [ -f codex-output.md ]; then
              cat codex-output.md
            else
              echo "Codex did not generate codex-output.md."
            fi

            printf '\n'
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Comment Codex Result
        if: steps.command.outputs.supported == 'true'
        uses: actions/github-script@v7
        env:
          BODY: ${{ steps.output.outputs.body }}
          COMMAND: ${{ steps.command.outputs.command }}
        with:
          script: |
            const title = process.env.COMMAND === 'fix'
              ? '## 🤖 Codexが修正を反映しました'
              : '## 🤖 Codexによる変更説明';

            const footer = process.env.COMMAND === 'fix'
              ? '\n\nレビューをお願いします。'
              : '';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${title}\n\n${process.env.BODY}${footer}`
            })
